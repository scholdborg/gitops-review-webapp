name: Review and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for deploying to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate job: review must pass, then build, then upload the artifact.
  review-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run code review (deploy gate)
        run: npm run review

      - name: Lint with ESLint (deploy gate)
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Manual approval gate. This job targets the `production` environment, which
  # has a required reviewer configured in the repo settings. The run PAUSES here
  # and GitHub emails the reviewer an Approve/Reject request; nothing deploys
  # until it is approved. Only runs if review + build + lint passed.
  approval:
    needs: review-build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved
        run: echo "Human approval granted — proceeding to deploy."

  # Deploy job: only runs after checks pass AND a reviewer approves.
  deploy:
    needs: [review-build, approval]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
