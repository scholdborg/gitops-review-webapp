name: Review and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for deploying to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # Gate job: review must pass, then build, then upload the artifact.
  review-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # full history so we can diff this push against its previous commit
          fetch-depth: 0

      # Render "what changed in this deploy" onto the run page, so the reviewer
      # who is asked to approve can see the commits and files before approving.
      - name: Change summary for reviewers
        if: github.event_name == 'push'
        env:
          BEFORE: ${{ github.event.before }}
          AFTER: ${{ github.sha }}
          REF: ${{ github.ref_name }}
        run: |
          {
            echo "## What changed in this deploy"
            echo ""
            echo "Branch \`$REF\` — commit \`${BEFORE:0:7}\` → \`${AFTER:0:7}\`"
            echo ""
            if git rev-parse --quiet --verify "$BEFORE^{commit}" >/dev/null 2>&1; then
              echo "### Commits"
              git log --pretty='- `%h` %s — %an' "$BEFORE..$AFTER"
              echo ""
              echo "### Files changed"
              echo '```'
              git diff --stat "$BEFORE" "$AFTER"
              echo '```'
            else
              echo "_Previous commit not available (first deploy); showing latest commit._"
              echo ""
              git log -1 --pretty='- `%h` %s — %an' "$AFTER"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Run code review (deploy gate)
        run: npm run review

      - name: Lint with ESLint (deploy gate)
        run: npm run lint

      - name: Build site
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  # Manual approval gate. This job targets the `production` environment, which
  # has a required reviewer configured in the repo settings. The run PAUSES here
  # and GitHub emails the reviewer an Approve/Reject request; nothing deploys
  # until it is approved. Only runs if review + build + lint passed.
  approval:
    needs: review-build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Approved
        run: echo "Human approval granted — proceeding to deploy."

  # Deploy job: only runs after checks pass AND a reviewer approves.
  deploy:
    needs: [review-build, approval]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
